<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageFlow Optimizer + WebP + Alt Text</title>
    <style>
      :root {
        --bg-1: #f3f6ff;
        --bg-2: #f7fbff;
        --panel: rgba(255, 255, 255, 0.78);
        --line: rgba(148, 163, 184, 0.28);
        --text: #0f172a;
        --muted: #64748b;
        --primary: #2563eb;
        --primary-strong: #1d4ed8;
        --shadow: 0 20px 45px rgba(30, 64, 175, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 28px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background:
          radial-gradient(700px 360px at -8% -12%, #dbeafe 0%, transparent 70%),
          radial-gradient(620px 320px at 110% 0%, #ccfbf1 0%, transparent 68%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2));
      }

      .container {
        max-width: 1120px;
        margin: 0 auto;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.6rem, 2.2vw, 2rem);
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        margin-top: 16px;
      }

      input[type='file'] {
        width: 100%;
        border: 1px dashed #93c5fd;
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.7);
      }

      .controls-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        font-size: 14px;
      }

      .btn {
        border: 0;
        border-radius: 12px;
        padding: 10px 16px;
        cursor: pointer;
        font-weight: 650;
        transition: transform .18s ease, box-shadow .22s ease, filter .22s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        color: #fff;
        box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.88);
        color: #0f172a;
        border: 1px solid var(--line);
      }

      .btn:disabled {
        opacity: .55;
        cursor: not-allowed;
      }

      .status {
        color: #334155;
        font-size: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.16);
      }

      #cards {
        margin-top: 20px;
        display: grid;
        gap: 14px;
      }

      .card {
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
      }

      .row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      .preview-wrap {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 10px;
        width: 100%;
      }

      .preview-block img {
        width: 100%;
        height: 190px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.25);
      }

      .stats {
        min-width: 280px;
        flex: 1;
      }

      .stats p {
        margin: 7px 0;
      }

      textarea {
        width: 100%;
        min-height: 72px;
        margin-top: 8px;
        padding: 11px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        background: rgba(255, 255, 255, 0.9);
        color: #0f172a;
      }

      textarea:focus,
      input:focus {
        outline: 2px solid rgba(37, 99, 235, 0.2);
        border-color: rgba(37, 99, 235, 0.5);
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      .tag {
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.12);
        color: #1e40af;
        font-size: 12px;
        display: inline-block;
      }

      @media (max-width: 760px) {
        body { padding: 16px; }
        .panel { padding: 16px; border-radius: 16px; }
        .preview-wrap { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <h1>All-in-one Image Workflow</h1>
        <p>Upload → optimize quality-preserving compression → convert to WebP → auto-generate SEO alt text → download.</p>

        <div class="controls">
          <input id="imageInput" type="file" accept="image/*" multiple />
          <div class="controls-row">
            <label><input id="keepOriginal" type="checkbox" checked /> Also download original files as backup on Download All</label>
            <label>Quality
              <input id="qualityRange" type="range" min="65" max="95" value="86" />
              <span id="qualityVal" class="tag">86</span>
            </label>
          </div>
          <div class="controls-row">
            <button id="processBtn" class="btn btn-primary">Process Images</button>
            <button id="downloadAllBtn" class="btn btn-secondary" style="display:none;">Download All (WebP files)</button>
            <button id="clearBtn" class="btn btn-secondary">Clear</button>
          </div>
          <div class="status" id="status">No images selected.</div>
          <p class="muted">After downloading (single or all), the tool auto-copies alt text to clipboard and clears the queue.</p>
        </div>
      </div>

      <div id="cards"></div>
    </div>

        <script>
      const state = {
        items: []
      };

      const imageInput = document.getElementById('imageInput');
      const processBtn = document.getElementById('processBtn');
      const downloadAllBtn = document.getElementById('downloadAllBtn');
      const clearBtn = document.getElementById('clearBtn');
      const statusEl = document.getElementById('status');
      const cardsEl = document.getElementById('cards');
      const keepOriginalEl = document.getElementById('keepOriginal');
      const qualityRange = document.getElementById('qualityRange');
      const qualityVal = document.getElementById('qualityVal');

      qualityRange.addEventListener('input', () => (qualityVal.textContent = qualityRange.value));

      function formatBytes(bytes) {
        if (!bytes) return '0 B';
        const units = ['B', 'KB', 'MB'];
        const idx = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        return `${(bytes / Math.pow(1024, idx)).toFixed(idx === 0 ? 0 : 2)} ${units[idx]}`;
      }

      function sanitizeFileName(name) {
        return name
          .replace(/\.[^/.]+$/, '')
          .replace(/[\-_]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function extractSubjectFromName(baseName) {
        const raw = (baseName || '')
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, ' ')
          .replace(/[\-_]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();

        const stopWords = new Set([
          'img', 'image', 'photo', 'picture', 'final', 'edited', 'edit', 'copy', 'new', 'version',
          'the', 'a', 'an', 'and', 'of', 'for', 'to', 'in', 'on', 'at', 'with'
        ]);

        const words = raw.split(' ').filter((w) => w && !stopWords.has(w) && !/^\d+$/.test(w));
        return words.slice(0, 8).join(' ');
      }

      function generateAltText(baseName, width, height, avgColor, brightness) {
        const subject = extractSubjectFromName(baseName);
        const orientationLabel = width >= height ? 'wide' : 'portrait';
        const lighting = brightness > 165 ? 'bright natural lighting' : brightness > 120 ? 'balanced natural lighting' : 'soft low lighting';

        let colorHint = 'neutral colors';
        if (avgColor.r > avgColor.g && avgColor.r > avgColor.b) colorHint = 'warm colors';
        if (avgColor.b > avgColor.r && avgColor.b > avgColor.g) colorHint = 'cool colors';
        if (avgColor.g > avgColor.r && avgColor.g > avgColor.b) colorHint = 'green tones';

        if (subject) {
          return `${orientationLabel} photo of ${subject}, showing clear details, realistic texture, and natural depth, with ${lighting}, ${colorHint}, and a clean focused composition suitable for search and accessibility.`;
        }

        return `${orientationLabel} photo showing clear visual details, realistic texture, and natural depth, with ${lighting}, ${colorHint}, and a clean focused composition suitable for search and accessibility.`;
      }

      async function getImageStats(file) {
        const url = URL.createObjectURL(file);
        const img = await createImageBitmap(file);
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 32, 32);
        const data = ctx.getImageData(0, 0, 32, 32).data;
        let r = 0, g = 0, b = 0, luminance = 0;
        for (let i = 0; i < data.length; i += 4) {
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
          luminance += (0.2126 * data[i]) + (0.7152 * data[i + 1]) + (0.0722 * data[i + 2]);
        }
        const pixels = data.length / 4;
        return {
          originalUrl: url,
          width: img.width,
          height: img.height,
          avgColor: { r: r / pixels, g: g / pixels, b: b / pixels },
          brightness: luminance / pixels
        };
      }

      async function optimizeAndConvertToWebP(file, quality = 0.86) {
        const img = await createImageBitmap(file);
        const maxDimension = 2560;
        let targetW = img.width;
        let targetH = img.height;

        if (Math.max(img.width, img.height) > maxDimension) {
          const scale = maxDimension / Math.max(img.width, img.height);
          targetW = Math.round(img.width * scale);
          targetH = Math.round(img.height * scale);
        }

        const canvas = document.createElement('canvas');
        canvas.width = targetW;
        canvas.height = targetH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, targetW, targetH);

        let q = quality;
        let blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/webp', q));
        const maxTarget = file.size * 0.65;

        while (blob.size > maxTarget && q > 0.65) {
          q -= 0.04;
          blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/webp', q));
        }

        return blob;
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1500);
      }

      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch {
          return false;
        }
      }

      function clearAll() {
        state.items.forEach((item) => {
          URL.revokeObjectURL(item.originalUrl);
          if (item.optimizedUrl) URL.revokeObjectURL(item.optimizedUrl);
        });
        state.items = [];
        imageInput.value = '';
        render();
        statusEl.textContent = 'Queue cleared.';
      }

      async function processFiles() {
        const files = [...imageInput.files];
        if (!files.length) {
          statusEl.textContent = 'Please select image files first.';
          return;
        }

        state.items = [];
        statusEl.textContent = `Processing ${files.length} image(s)...`;
        const quality = Number(qualityRange.value) / 100;

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const stats = await getImageStats(file);
          const optimizedBlob = await optimizeAndConvertToWebP(file, quality);
          const optimizedUrl = URL.createObjectURL(optimizedBlob);
          const cleanName = sanitizeFileName(file.name);
          const altText = generateAltText(cleanName, stats.width, stats.height, stats.avgColor, stats.brightness);

          state.items.push({
            file,
            originalUrl: stats.originalUrl,
            width: stats.width,
            height: stats.height,
            optimizedBlob,
            optimizedUrl,
            altText,
            outName: `${cleanName || 'image'}-optimized.webp`
          });

          statusEl.textContent = `Processed ${i + 1}/${files.length}...`;
        }

        statusEl.textContent = `Done. ${state.items.length} image(s) ready.`;
        render();
      }

      async function downloadAll() {
        if (!state.items.length) return;
        const includeOriginal = keepOriginalEl.checked;

        statusEl.textContent = `Downloading ${state.items.length} optimized WebP file(s)...`;
        state.items.forEach((item) => {
          downloadBlob(item.optimizedBlob, item.outName);
          if (includeOriginal) {
            downloadBlob(item.file, `backup-original-${item.file.name}`);
          }
        });

        const copied = await copyToClipboard(state.items[0].altText.trim());
        statusEl.textContent = copied
          ? 'Downloaded all WebP files. First alt text copied. Queue auto-cleared.'
          : 'Downloaded all WebP files. Clipboard unavailable; queue auto-cleared.';

        clearAll();
      }

      function render() {
        cardsEl.innerHTML = '';
        const count = state.items.length;
        downloadAllBtn.style.display = count > 1 ? 'inline-block' : 'none';

        state.items.forEach((item, index) => {
          const reduction = ((1 - (item.optimizedBlob.size / item.file.size)) * 100).toFixed(1);
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="row">
              <div class="preview-wrap">
                <div class="preview-block">
                  <p class="muted">Original</p>
                  <img src="${item.originalUrl}" alt="Original preview" />
                </div>
                <div class="preview-block">
                  <p class="muted">Optimized WebP</p>
                  <img src="${item.optimizedUrl}" alt="Optimized preview" />
                </div>
              </div>
            </div>
            <div class="stats">
              <p><strong>${item.file.name}</strong></p>
              <p>Dimensions: ${item.width}×${item.height}</p>
              <p>Size: ${formatBytes(item.file.size)} → ${formatBytes(item.optimizedBlob.size)} (${reduction}% smaller)</p>
              <label>Descriptive SEO alt text (editable)</label>
              <textarea data-index="${index}">${item.altText}</textarea>
              <div class="controls-row" style="margin-top:10px;">
                <button class="btn btn-primary" data-download="${index}">Download image</button>
              </div>
            </div>
          `;
          cardsEl.appendChild(card);
        });

        cardsEl.querySelectorAll('textarea').forEach((ta) => {
          ta.addEventListener('input', (e) => {
            const idx = Number(e.target.dataset.index);
            state.items[idx].altText = e.target.value;
          });
        });

        cardsEl.querySelectorAll('[data-download]').forEach((btn) => {
          btn.addEventListener('click', async (e) => {
            const idx = Number(e.target.dataset.download);
            const item = state.items[idx];
            downloadBlob(item.optimizedBlob, item.outName);
            const copied = await copyToClipboard(item.altText.trim());
            statusEl.textContent = copied
              ? 'Downloaded image. Alt text copied. Queue auto-cleared.'
              : 'Downloaded image. Clipboard unavailable; queue auto-cleared.';
            clearAll();
          });
        });
      }

      processBtn.addEventListener('click', processFiles);
      downloadAllBtn.addEventListener('click', downloadAll);
      clearBtn.addEventListener('click', clearAll);
    </script>
  </body>
</html>
